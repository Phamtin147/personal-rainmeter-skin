[Rainmeter]
Update=1000

[Variables]
@include=#@#Variables.inc
SCALE=#BScale#

[MeasureBatteryPercent]
Measure=Plugin
Plugin=PowerPlugin
PowerState=Percent


[MeterEmptyBattery]
Meter=Image
ImageName=#@#Images\b.png
ImageTint=#BColor#
X=(0*#SCALE#)
Y=(0*#SCALE#)
W=(45*#SCALE#)


[MeterBatteryPercent]
Meter=STRING
MeasureName=MeasureBatteryPercent
X=(53*#SCALE#)r
Y=(13*#Scale#)r
FontColor=#BColor#
FontWeight=700
FontSize=(16*#Scale#)
Percentual=1
Text=%1% 
AntiAlias=1


[MeterBarBattery]
Meter=Bar
MeasureName=MeasureBatteryPercent
BarOrientation=Horizontal
X=(-48*#Scale#)r
Y=(3*#Scale#)r
W=(33.5*#Scale#)
H=(16*#Scale#)
BarColor=#ThemeColor#