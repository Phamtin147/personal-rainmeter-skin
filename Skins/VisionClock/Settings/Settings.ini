[TimeTxt]
Meter=String
StringAlign=Left
FontFace=#FontFace#
FontColor=#FontColor3#
FontSize=11
X=20
Y=350
Text=Choose the time format  >>>
AntiAlias=1

[12H]
Meter=String
StringAlign=left
FontFace=#FontFace#
FontColor=#FontColor2#
FontSize=12
StringStyle=Bold
X=230
Y=350
Text=12H 
AntiAlias=1
MouseOverAction=[!SetOption 12H FontSize 14][!UpdateMeter 12H][!Redraw]
MouseLeaveAction=[!SetOption 12H FontSize 12][!UpdateMeter 12H][!Redraw]
LeftMouseUpAction=[!WriteKeyValue Variables #VariableToWrite# "%I:%M" "#FileToWrite#"][!WriteKeyValue Variables #VariableToWrite2# "0" "#FileToWrite#"][!Refresh][!Refresh "#ROOTCONFIG#"]

[24H]
Meter=String
StringAlign=left
FontFace=#FontFace#
FontColor=#FontColor2#
FontSize=12
StringStyle=Bold
X=290
Y=350
