X=480
Y=216
W=150
H=20
AntiAlias=1
FocusDismiss=1
Command1=[!WriteKeyValue Variables Longitude "$UserInput$" "#@#Variables.inc"][!Refresh][!Refresh "#ROOTCONFIG#"]
