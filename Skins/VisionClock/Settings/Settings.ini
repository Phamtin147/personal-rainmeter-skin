MouseLeaveAction=[!SetOption Fahrenheit FontSize 12][!UpdateMeter Fahrenheit][!Redraw]
LeftMouseUpAction=[!WriteKeyValue Variables #VariableToWrite6# "en-US" "#FileToWrite#"][!WriteKeyValue Variables #VariableToWrite7# "TimeFormat12H" "#FileToWrite#"][!WriteKeyValue Variables #VariableToWrite8# "Mph" "#FileToWrite#"][!WriteKeyValue Variables #VariableToWrite9# "In" "#FileToWrite#"][!WriteKeyValue Variables #VariableToWrite10# "Mile" "#FileToWrite#"][!WriteKeyValue Variables #VariableToWrite12# "e" "#FileToWrite#"][!Refresh][!Refresh "#ROOTCONFIG#"]

