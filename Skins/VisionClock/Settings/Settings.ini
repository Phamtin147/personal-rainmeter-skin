[Rainmeter]
Update=-1

[Variables]
@include=#@#Variables.inc

FileToWrite=#@#Variables.inc


VariableToWrite=TimeFormat2
VariableToWrite2=Dsb
VariableToWrite3=FontColorText
VariableToWrite4=FontColorShadow
VariableToWrite5=FontColorShadow2
VariableToWrite6=Language
VariableToWrite7=TimeFormat
VariableToWrite8=SpeedUnit
VariableToWrite9=PressureUnit
VariableToWrite10=VisibilityUnit
VariableToWrite11=DateFormat
VariableToWrite12=Units




[MeterBg]
Meter=Shape
X=0
Y=0
Shape=Rectangle 1,1,800,65 | Fill Color 13,13,13 | Stroke Color 0,0,0,0

[MeterBg2]
Meter=Shape
X=0
Y=65
Shape=Rectangle 1,1,800,530 | Fill Color 0,75,155 | Stroke Color 0,0,0,0

[MeterLat]
Meter=Shape
X=145
Y=210
Shape=Rectangle 1,1,160,30 | Fill Color 0,0,0,1 | Stroke Color 255,255,255,255
LeftMouseUpAction=[!CommandMeasure "MeterInputLat" "ExecuteBatch 1"]

[MeterLong]
Meter=Shape
X=475
Y=210
Shape=Rectangle 1,1,160,30 | Fill Color 0,0,0,1 | Stroke Color 255,255,255,255
LeftMouseUpAction=[!CommandMeasure "MeterInputLong" "ExecuteBatch 1"]

[MeterSize]
Meter=Shape
X=120
Y=466
Shape=Rectangle 1,1,60,30 | Fill Color 0,0,0,1 | Stroke Color 255,255,255,255
LeftMouseUpAction=[!CommandMeasure "MeterInput" "ExecuteBatch 1"]

[MeterTitle]
Meter=String
StringAlign=center
FontFace=#FontFace#
FontColor=#FontColor#
FontSize=17
StringStyle=Bold
ClipString=1
X=400
Y=6
W=480
H=60
Text=<<<   Vision Clock   >>>#CRLF#S E T T I N G S
AntiAlias=1
InlineSetting=Size | 14
InlinePattern=S E T T I N G S
InlineSetting2=Color | #FontColor3#
InlinePattern2=S E T T I N G S
InlineSetting3=Weight | 500
InlinePattern3=S E T T I N G S

[MeterInstruction]
Meter=String
StringAlign=Left
FontFace=#FontFace#
FontColor=#FontColor3#
FontSize=12
X=20
Y=105
Text=1.Go to website mapcoordinates.net >>>#CRLF#2.Search for your city by name.#CRLF#3.Zoom in to get a more detailed view,then go to the exact position (street,building) and click on the map.#CRLF#4.Insert the values for latitude and longitude in the fields below and press the "Enter" key.
AntiAlias=1

[MeterLocation]
Meter=Image
ImageName=#@#loc.png
X=320
Y=92
AntiAlias=1
LeftMouseUpAction=["https://www.mapcoordinates.net"]

[LatTxt]
Meter=String
StringAlign=left
FontFace=#FontFace#
FontColor=#FontColor2#
FontSize=12
StringStyle=Bold
X=50
Y=215
Text=LATITUDE
AntiAlias=1

[MeterLatValue]
Meter=String
StringAlign=center
FontFace=#FontFace#
FontColor=255,255,0
FontSize=10
X=225
Y=217
Text=#Latitude#
AntiAlias=1
ToolTipText=Click and paste the value

[MeterInputLat]
Measure=Plugin
Plugin=InputText
StringAlign=center
FontFace=#FontFace#
FontSize=10
FontColor=0,0,0
SolidColor=215,215,215,255
X=150
Y=216
W=150
H=20
AntiAlias=1
FocusDismiss=1
Command1=[!WriteKeyValue Variables Latitude "$UserInput$" "#@#Variables.inc"][!Refresh "#ROOTCONFIG#\Settings"]
DefaultValue=#Latitude#

[LongTxt]
