MouseLeaveAction=[!SetOption 24H FontSize 12][!UpdateMeter 24H][!Redraw]
LeftMouseUpAction=[!WriteKeyValue Variables #VariableToWrite# "%H:%M" "#FileToWrite#"][!WriteKeyValue Variables #VariableToWrite2# "1" "#FileToWrite#"][!Refresh][!Refresh "#ROOTCONFIG#"]

[Tempxt]
Meter=String
StringAlign=Left
FontFace=#FontFace#
FontColor=#FontColor3#
FontSize=11
X=20
Y=390
