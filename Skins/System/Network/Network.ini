[Rainmeter]
Update=1000
AccurateText=1

[Variables]
CardW=210
TopH=22
BotH=118
Radius=5

ColorTop=76,35,13
ColorBot=59,26,9,160
ColorBar=255,255,255
ColorTextTitle=255,255,255,220
ColorText=255,255,255,255
ColorTextSub=255,255,255,180
Scale=1

; ==================================
; MEASURES
; ==================================

; Lấy tên WiFi hoặc nếu cắm dây sẽ báo Ethernet (hoặc số -1 tuỳ module)
[MeasureSSID]
Measure=Plugin
Plugin=WiFiStatus
WiFiInfoType=SSID
WiFiIntfID=0
Substitute="-1":"Ethernet"

; Lấy IP mạng nội bộ (LAN IP)
[MeasureIP]
Measure=Plugin
Plugin=SysInfo
SysInfoType=IP_ADDRESS
SysInfoData=Best

; Lấy IP mạng ngoài (Public IP)
[MeasureExtIP]
Measure=WebParser
Url=https://api.ipify.org
RegExp=(.*)
UpdateRate=3600
StringIndex=1

; Đo độ trễ từ máy đến DNS Google (Ping)
[MeasurePing]
Measure=Plugin
Plugin=Ping
DestAddress=8.8.8.8
UpdateRate=2

; Tốc độ Tải xuống
[MeasureNetIn]
Measure=NetIn

; Tốc độ Tải lên
[MeasureNetOut]
Measure=NetOut

; ==================================
; METERS
; ==================================

[Bg]
Meter=Shape
Shape=Rectangle 0,0,(#CardW#*#Scale#),((#TopH#+#BotH#)*#Scale#),(#Radius#*#Scale#) | FillColor #ColorBot# | StrokeWidth 0
Shape2=Rectangle 0,0,(#CardW#*#Scale#),(#TopH#*#Scale#),(#Radius#*#Scale#) | FillColor #ColorTop# | StrokeWidth 0
Shape3=Rectangle 0,((#TopH#-#Radius#)*#Scale#),(#CardW#*#Scale#),(#Radius#*#Scale#) | FillColor #ColorTop# | StrokeWidth 0
DynamicVariables=1

[Title]
Meter=String
LogSubstring=1
X=((#CardW#/2)*#Scale#)
Y=((#TopH#/2)*#Scale#)
StringAlign=CenterCenter
FontWeight=700
FontSize=(9*#Scale#)
FontColor=#ColorTextTitle#
Text="NETWORK"
AntiAlias=1

; --- 1. MẠNG ĐANG KẾT NỐI ---
[Label_SSID]
Meter=String
X=(12*#Scale#)
Y=((#TopH# + 12)*#Scale#)
StringAlign=LeftCenter
FontSize=(8*#Scale#)
FontWeight=700
FontColor=#ColorText#
Text="Connection"
AntiAlias=1

[Value_SSID]
Meter=String
MeasureName=MeasureSSID
X=((#CardW#-12)*#Scale#)
Y=0r
StringAlign=RightCenter
FontSize=(8*#Scale#)
FontWeight=600
FontColor=#ColorTextSub#
Text="%1"
AntiAlias=1

; --- 2. LOCAL IP ---
[Label_IP]
Meter=String
X=(12*#Scale#)
Y=(16*#Scale#)r
StringAlign=LeftCenter
FontSize=(8*#Scale#)
FontWeight=700
FontColor=#ColorText#
Text="Local IP"
AntiAlias=1

[Value_IP]
Meter=String
MeasureName=MeasureIP
X=((#CardW#-12)*#Scale#)
Y=0r
StringAlign=RightCenter
FontSize=(8*#Scale#)
FontWeight=600
FontColor=#ColorTextSub#
Text="%1"
AntiAlias=1

; --- 3. PUBLIC IP ---
[Label_ExtIP]
Meter=String
X=(12*#Scale#)
Y=(16*#Scale#)r
StringAlign=LeftCenter
FontSize=(8*#Scale#)
FontWeight=700
FontColor=#ColorText#
Text="External IP"
AntiAlias=1

[Value_ExtIP]
Meter=String
MeasureName=MeasureExtIP
X=((#CardW#-12)*#Scale#)
Y=0r
StringAlign=RightCenter
FontSize=(8*#Scale#)
FontWeight=600
FontColor=#ColorTextSub#
Text="%1"
AntiAlias=1

; --- 4. PING ---
[Label_Ping]
Meter=String
X=(12*#Scale#)
Y=(16*#Scale#)r
StringAlign=LeftCenter
FontSize=(8*#Scale#)
FontWeight=700
FontColor=#ColorText#
Text="Ping"
AntiAlias=1

[Value_Ping]
Meter=String
MeasureName=MeasurePing
X=((#CardW#-12)*#Scale#)
Y=0r
StringAlign=RightCenter
FontSize=(8*#Scale#)
FontWeight=600
FontColor=#ColorTextSub#
Text="%1 ms"
AntiAlias=1

; --- 5. TỐC ĐỘ TẢI XUỐNG ---
[Label_DL]
Meter=String
X=(12*#Scale#)
Y=(16*#Scale#)r
StringAlign=LeftCenter
FontSize=(8*#Scale#)
FontWeight=700
FontColor=#ColorText#
Text="Download Speed"
AntiAlias=1

[Value_DL]
Meter=String
MeasureName=MeasureNetIn
X=((#CardW#-12)*#Scale#)
Y=0r
StringAlign=RightCenter
FontSize=(8*#Scale#)
FontWeight=600
FontColor=#ColorTextSub#
AutoScale=1
Text="%1B/s"
NumOfDecimals=1
AntiAlias=1

; --- 6. TỐC ĐỘ TẢI LÊN ---
[Label_UL]
Meter=String
X=(12*#Scale#)
Y=(16*#Scale#)r
StringAlign=LeftCenter
FontSize=(8*#Scale#)
FontWeight=700
FontColor=#ColorText#
Text="Upload Speed"
AntiAlias=1

[Value_UL]
Meter=String
MeasureName=MeasureNetOut
X=((#CardW#-12)*#Scale#)
Y=0r
StringAlign=RightCenter
FontSize=(8*#Scale#)
FontWeight=600
FontColor=#ColorTextSub#
AutoScale=1
Text="%1B/s"
NumOfDecimals=1
AntiAlias=1
