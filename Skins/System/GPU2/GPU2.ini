[Rainmeter]
Update=1000
AccurateText=1

[Variables]
CardW=210
TopH=22
BotH=36
Radius=5

ColorTop=76,35,13
ColorBot=59,26,9,160
ColorBar=255,255,255
ColorTextTitle=255,255,255,220
ColorText=255,255,255,255
ColorTextSub=255,255,255,180
Scale=1

[StyleBg]
Shape=Rectangle 0,0,(#CardW#*#Scale#),((#TopH#+#BotH#)*#Scale#),(#Radius#*#Scale#) | FillColor #ColorBot# | StrokeWidth 0
Shape2=Rectangle 0,0,(#CardW#*#Scale#),(#TopH#*#Scale#),(#Radius#*#Scale#) | FillColor #ColorTop# | StrokeWidth 0
Shape3=Rectangle 0,((#TopH#-#Radius#)*#Scale#),(#CardW#*#Scale#),(#Radius#*#Scale#) | FillColor #ColorTop# | StrokeWidth 0
DynamicVariables=1

[StyleTitle]
X=((#CardW#/2)*#Scale#)
Y=((#TopH#/2)*#Scale#)
StringAlign=CenterCenter
FontWeight=700
FontSize=(9*#Scale#)
FontColor=#ColorTextTitle#
AntiAlias=1

[StyleLabel]
X=(12*#Scale#)
Y=((#TopH# + #BotH#/2 - 4)*#Scale#)
StringAlign=LeftCenter
FontSize=(8*#Scale#)
FontWeight=700
FontColor=#ColorText#
AntiAlias=1

[StyleValue]
X=((#CardW#-12)*#Scale#)
Y=0r
StringAlign=RightCenter
FontSize=(8*#Scale#)
FontWeight=600
FontColor=#ColorTextSub#
AntiAlias=1
DynamicVariables=1

[StyleBarBg]
Shape=Rectangle (12*#Scale#),((#TopH#+#BotH#-8)*#Scale#),((#CardW#-24)*#Scale#),(2*#Scale#),(1*#Scale#) | FillColor 255,255,255,20 | StrokeWidth 0
DynamicVariables=1

[StyleBar]
BarColor=#ColorBar#
SolidColor=0,0,0,0
BarOrientation=Horizontal
X=(12*#Scale#)
Y=((#TopH#+#BotH#-8)*#Scale#)
W=((#CardW#-24)*#Scale#)
H=(2*#Scale#)
DynamicVariables=1

[MeasureGPU2]
Measure=Plugin
Plugin=UsageMonitor
Alias=GPU
Index=2
MinValue=0
MaxValue=100

[Bg]
Meter=Shape
MeterStyle=StyleBg

[Title]
Meter=String
MeterStyle=StyleTitle
Text="GPU 2 (DEDICATED)"

[Label]
Meter=String
MeterStyle=StyleLabel
Text="RTX 3070 Ti"

[Value]
Meter=String
MeterStyle=StyleValue
Text="[MeasureGPU2:0]%"

[BarBg]
Meter=Shape
MeterStyle=StyleBarBg

[Bar]
Meter=Bar
MeterStyle=StyleBar
MeasureName=MeasureGPU2

