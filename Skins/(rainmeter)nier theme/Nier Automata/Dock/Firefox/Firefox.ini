[Firefox]
Meter=Image
ImageName=#@#Underlay\light.png
H=35
LeftMouseDownAction=["D:\SC game"][Play "#@#Klick.wav"]
MouseOverAction=[!SetOption #CURRENTSECTION# ImageName "#@#Underlay\dark.png"][!UpdateMeter "#CURRENTSECTION#"][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# ImageName "#@#Underlay\light.png"][!UpdateMeter "#CURRENTSECTION#"][!Redraw]

[FirefoxTitle]
Meter=String
Text=Game
FontSize=14
FontFace=Gibson
FontColor=#FontDark#
AntiAlias=1
MouseOverAction=[!SetOption #CURRENTSECTION# FontColor #FontLight#][!UpdateMeter "#CURRENTSECTION#"][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# FontColor #FontDark#][!UpdateMeter "#CURRENTSECTION#"][!Redraw]
W=150
H=25
StringAlign=LEFT
Padding=100,8,0,0

[Variables]
FontLight=217,213,196
FontDark=64,61,52

[Rainmeter]
Update=1000
