[Rainmeter]
Update=10

[Variables]
@Include=#@#Variables.ini

[Metadata]
Name=NieR Automata
Author=Cold Damage
Information=See the time in stylish fashion.
Version=2.4345

[MeasureTimeS]
Measure=Time
Format=%S
MinValue=0
MaxValue=60

[MeasureTimeM]
Measure=Time
Format=%M
MinValue=0
MaxValue=60

[MeasureTimeH]
Measure=Time
Format=%H
MinValue=0
MaxValue=24

[Shape1]
Meter=Shape
Shape=Ellipse 70,70,60 | Fill Color #Grey# | StrokeWidth 0
Hidden=0

[Shape2]
Meter=Shape
Shape=Ellipse 70,70,60 | Fill Color #Grey2# | StrokeWidth 0
Hidden=1

[Shape0]
Meter=Shape
Shape=Ellipse 70,70,60 | Fill Color 0,0,0,1 | StrokeWidth 0
MouseOverAction=[!SetOption Shape1 Hidden 1][!SetOption Shape2 Hidden 0][!SetOption ClockS FontColor #Grey#][!SetOption ClockM FontColor #Grey#][!SetOption ClockH FontColor #Grey#][!SetOption MeterTimeS LineColor #Grey#][!SetOption MeterTimeM LineColor #Grey#][!SetOption MeterTimeH LineColor #Grey#][PLAY #@#Menu1.wav]
MouseLeaveAction=[!SetOption Shape1 Hidden 0][!SetOption Shape2 Hidden 1][!SetOption ClockS FontColor #Grey2#][!SetOption ClockM FontColor #Grey2#][!SetOption ClockH FontColor #Grey2#][!SetOption MeterTimeS LineColor #Grey2#][!SetOption MeterTimeM LineColor #Grey2#][!SetOption MeterTimeH LineColor #Grey2#]

[ClockS]
Meter=String
MeasureName=MeasureTimeS
Format=%S
X=100
Y=50
FontFace=#Font#
FontSize=20
FontColor=#Grey2#
StringAlign=Center
FontEffectColor=0,0,0,200
AntiAlias=1

[ClockM]
Meter=String
MeasureName=MeasureTimeM
Format=%M
X=70
Y=50
FontFace=#Font#
FontSize=20
FontColor=#Grey2#
StringAlign=Center
FontEffectColor=0,0,0,200
AntiAlias=1

[ClockH]
Meter=String
MeasureName=MeasureTimeH
Format=%H
X=40
Y=50
FontFace=#Font#
FontSize=20
FontColor=#Grey2#
StringAlign=Center
FontEffectColor=0,0,0,200
AntiAlias=1

[MeterTimeS]
Meter = RoundLine
MeasureName = MeasureTimeS
X = 34
Y = 34
LineLength = 60
LineStart = 57
LineColor = #Grey2#
StartAngle = -1.57
RotationAngle = 6.28
Antialias = 1
W =72
H = 72
Solid = 1

[MeterTimeM]
Meter = RoundLine
MeasureName = MeasureTimeM
X = 34
Y = 34
LineLength = 55
LineStart = 52
LineColor = #Grey2#
StartAngle = -1.57
RotationAngle = 6.28
Antialias = 1
W =72
H = 72
Solid = 1

[MeterTimeH]
Meter = RoundLine
MeasureName = MeasureTimeH
X = 34
Y = 34
LineLength = 50
LineStart = 47
LineColor = #Grey2#
StartAngle = -1.57
RotationAngle = 6.28
Antialias = 1
W =72
H = 72
Solid = 1