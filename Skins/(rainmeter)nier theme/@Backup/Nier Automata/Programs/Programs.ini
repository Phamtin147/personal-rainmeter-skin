[Rainmeter]
Update=10

[Variables]
@Include=#@#Variables.ini

[Metadata]
Name=NieR Automata
Author=Cold Damage
Information=Here are my most used programs, edit to your liking.
Version=2.4345

[Mozilla]
Meter=String
Text=Mozilla
X=0
Y=0
W=200
H=30
SolidColor=#Grey#
FontFace=#Font#
FontColor=#Grey2#
FontSize=#Size#
MouseOverAction=[!SetOption Mozilla FontColor #Grey#][!SetOption Mozilla SolidColor #Grey2#][!SetOption MozillaShape1 Hidden 1][!SetOption MozillaShape2 Hidden 0][PLAY #@#Menu1.wav]
MouseLeaveAction=[!SetOption Mozilla FontColor #Grey2#][!SetOption Mozilla SolidColor #Grey#][!SetOption MozillaShape1 Hidden 0][!SetOption MozillaShape2 Hidden 1]
AntiAlias=1
LeftMouseDownAction=!execute ["C:\Program Files (x86)\Mozilla Firefox/firefox.exe"][PLAY #@#Menu2.wav]
StringAlign=Left
Padding=50,0,0,0

[MozillaShape1]
Meter=Shape
Shape=Rectangle 5,5,20,20 | Fill Color #Grey2# | StrokeWidth 0
Hidden=0

[MozillaShape2]
Meter=Shape
Shape=Rectangle 5,5,20,20 | Fill Color #Grey# | StrokeWidth 0
Hidden=1

[Photoshop]
Meter=String
Text=Photoshop
X=0
Y=40
W=200
H=30
SolidColor=#Grey#
FontFace=#Font#
FontColor=#Grey2#
FontSize=#Size#
MouseOverAction=[!SetOption Photoshop FontColor #Grey#][!SetOption Photoshop SolidColor #Grey2#][!SetOption PhotoshopShape1 Hidden 1][!SetOption PhotoshopShape2 Hidden 0][PLAY #@#Menu1.wav]
MouseLeaveAction=[!SetOption Photoshop FontColor #Grey2#][!SetOption Photoshop SolidColor #Grey#][!SetOption PhotoshopShape1 Hidden 0][!SetOption PhotoshopShape2 Hidden 1]
AntiAlias=1
LeftMouseDownAction=!execute ["C:\ProgramData\Microsoft\Windows\Start Menu\Programs/Adobe Photoshop CC 2015"][PLAY #@#Menu2.wav]
StringAlign=Left
Padding=50,0,0,0

[PhotoshopShape1]
Meter=Shape
Shape=Rectangle 5,45,20,20 | Fill Color #Grey2# | StrokeWidth 0
Hidden=0

[PhotoshopShape2]
Meter=Shape
Shape=Rectangle 5,45,20,20 | Fill Color #Grey# | StrokeWidth 0
Hidden=1

[VisualStudio]
Meter=String
Text=VisualStudio
X=0
Y=80
W=200
H=30
SolidColor=#Grey#
FontFace=#Font#
FontColor=#Grey2#
FontSize=#Size#
MouseOverAction=[!SetOption VisualStudio FontColor #Grey#][!SetOption VisualStudio SolidColor #Grey2#][!SetOption VisualStudioShape1 Hidden 1][!SetOption VisualStudioShape2 Hidden 0][PLAY #@#Menu1.wav]
MouseLeaveAction=[!SetOption VisualStudio FontColor #Grey2#][!SetOption VisualStudio SolidColor #Grey#][!SetOption VisualStudioShape1 Hidden 0][!SetOption VisualStudioShape2 Hidden 1]
AntiAlias=1
LeftMouseDownAction=!execute ["C:\Program Files (x86)\Microsoft Visual Studio 14.0\Common7\IDE\devenv.exe"][PLAY #@#Menu2.wav]
StringAlign=Left
Padding=50,0,0,0

[VisualStudioShape1]
Meter=Shape
Shape=Rectangle 5,85,20,20 | Fill Color #Grey2# | StrokeWidth 0
Hidden=0

[VisualStudioShape2]
Meter=Shape
Shape=Rectangle 5,85,20,20 | Fill Color #Grey# | StrokeWidth 0
Hidden=1

[Discord]
Meter=String
Text=Discord
X=0
Y=120
W=200
H=30
SolidColor=#Grey#
FontFace=#Font#
FontColor=#Grey2#
FontSize=#Size#
MouseOverAction=[!SetOption Discord FontColor #Grey#][!SetOption Discord SolidColor #Grey2#][!SetOption DiscordShape1 Hidden 1][!SetOption DiscordShape2 Hidden 0][PLAY #@#Menu1.wav]
MouseLeaveAction=[!SetOption Discord FontColor #Grey2#][!SetOption Discord SolidColor #Grey#][!SetOption DiscordShape1 Hidden 0][!SetOption DiscordShape2 Hidden 1]
AntiAlias=1
LeftMouseDownAction=!execute ["C:\Users\#YourUserName#\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Hammer & Chisel, Inc\Discord.lnk"][PLAY #@#Menu2.wav]
StringAlign=Left
Padding=50,0,0,0

[DiscordShape1]
Meter=Shape
Shape=Rectangle 5,125,20,20 | Fill Color #Grey2# | StrokeWidth 0
Hidden=0

[DiscordShape2]
Meter=Shape
Shape=Rectangle 5,125,20,20 | Fill Color #Grey# | StrokeWidth 0
Hidden=1

