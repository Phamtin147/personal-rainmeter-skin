[Rainmeter]
Update=10

[Variables]
@Include=#@#Variables.ini

[Metadata]
Name=NieR Automata
Author=Cold Damage
Information=Information about your system.
Version=2.4345

[MeasureGPUtemp]
Measure=Plugin
Plugin=SpeedFanPlugin
SpeedFanType=Temperature
SpeedFanNumber=0
MinValue=0
MaxValue=80

[MeasureDiscSpace]
Measure=FreeDiskSpace
UpdateDivider=100
Drive=C:

[MeasureMemory]
Measure=PhysicalMemory
UpdateDivider=100

[MeasureCPU]
Measure=CPU
Processor=0
MinValue=0
MaxValue=100
UpdateDivider=100

[CPUTemperature]
Meter=String
MeasureName=MeasureGPUtemp
Format=%1
PreFix="GPU Temperature: "
PostFix=C
X=0
Y=0
W=240
H=30
SolidColor=#Grey#
FontFace=#Font#
FontColor=#Grey2#
FontSize=#Size#
MouseOverAction=[!SetOption CPUTemperature FontColor #Grey#][!SetOption CPUTemperature SolidColor #Grey2#][PLAY #@#Menu1.wav]
MouseLeaveAction=[!SetOption CPUTemperature FontColor #Grey2#][!SetOption CPUTemperature SolidColor #Grey#]
AntiAlias=1
StringAlign=Left
Padding=10,0,0,0

[CPUUsage]
Meter=String
MeasureName=MeasureCPU
Format=%1
PreFix="CPU Usage: "
PostFix=%
X=0
Y=40
W=240
H=30
SolidColor=#Grey#
FontFace=#Font#
FontColor=#Grey2#
FontSize=#Size#
MouseOverAction=[!SetOption CPUUsage FontColor #Grey#][!SetOption CPUUsage SolidColor #Grey2#][PLAY #@#Menu1.wav]
MouseLeaveAction=[!SetOption CPUUsage FontColor #Grey2#][!SetOption CPUUsage SolidColor #Grey#]
AntiAlias=1
StringAlign=Left
Padding=10,0,0,0

[RAMUsage]
Meter=String
MeasureName=MeasureMemory
Format=%1
PreFix="RAM Usage: "
PostFix=%
Percentual=1
X=0
Y=80
W=240
H=30
SolidColor=#Grey#
FontFace=#Font#
FontColor=#Grey2#
FontSize=#Size#
MouseOverAction=[!SetOption RAMUsage FontColor #Grey#][!SetOption RAMUsage SolidColor #Grey2#][PLAY #@#Menu1.wav]
MouseLeaveAction=[!SetOption RAMUsage FontColor #Grey2#][!SetOption RAMUsage SolidColor #Grey#]
AntiAlias=1
StringAlign=Left
Padding=10,0,0,0

[DiscUsage]
Meter=String
MeasureName=MeasureDiscSpace
Format=%1
PreFix="Disc space: "
PostFix=b
Autoscale=1
X=0
Y=120
W=240
H=30
SolidColor=#Grey#
FontFace=#Font#
FontColor=#Grey2#
FontSize=#Size#
MouseOverAction=[!SetOption DiscUsage FontColor #Grey#][!SetOption DiscUsage SolidColor #Grey2#][PLAY #@#Menu1.wav]
MouseLeaveAction=[!SetOption DiscUsage FontColor #Grey2#][!SetOption DiscUsage SolidColor #Grey#]
AntiAlias=1
StringAlign=Left
Padding=10,0,0,0