[Rainmeter]
Update=10

[Variables]
@Include=#@#Variables.ini

[Metadata]
Name=NieR Automata
Author=Cold Damage
Information=Right clicking on trashbin empties it.
Version=2.4345

[Pictures]
Meter=String
Text=Pictures
X=0
Y=0
W=200
H=30
SolidColor=#Grey#
FontFace=#Font#
FontColor=#Grey2#
FontSize=#Size#
MouseOverAction=[!SetOption Pictures FontColor #Grey#][!SetOption Pictures SolidColor #Grey2#][!SetOption PicturesShape1 Hidden 1][!SetOption PicturesShape2 Hidden 0][PLAY #@#Menu1.wav]
MouseLeaveAction=[!SetOption Pictures FontColor #Grey2#][!SetOption Pictures SolidColor #Grey#][!SetOption PicturesShape1 Hidden 0][!SetOption PicturesShape2 Hidden 1]
AntiAlias=1
LeftMouseDownAction=["C:\Users\#YourUserName#\Pictures"][PLAY #@#Menu2.wav]
StringAlign=Left
Padding=50,0,0,0

[PicturesShape1]
Meter=Shape
Shape=Rectangle 5,5,20,20 | Fill Color #Grey2# | StrokeWidth 0
Hidden=0

[PicturesShape2]
Meter=Shape
Shape=Rectangle 5,5,20,20 | Fill Color #Grey# | StrokeWidth 0
Hidden=1

